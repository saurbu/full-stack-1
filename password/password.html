v<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<style>
    body{
        justify-content: center;
        display: flex;
        background: #c68375;
    }
    .con{
        display: flex;
        flex-direction: column;
        background: #8f746f;

        border: 1px solid black;
        width: 400px;
        justify-content: center;
        text-align: center;
        padding: 20px;
    }
    input{
        background-color: rgb(196, 191, 191);
        border: 1px solid rgb( 8 8 8 .9);
    }
    .btn{
        width: 180px;
        height: 30px;
        background: greenyellow;
        cursor: pointer;
    }

</style>
</head>
<body>
<div class="con">
<h2>Registration Form</h2>

<form id="form">

<p>Name:</p>
<input type="text" id="name">
<p id="nameMsg"></p>

<p>Email:</p>
<input type="text" id="email">
<p id="emailMsg"></p>

<p>Phone:</p>
<input type="text" id="phone">
<p id="phoneMsg"></p>

<p>Password:</p>
<input type="password" id="password"><br>
<button type="button" id="toggle">Show</button>
<p id="strength"></p>

<br><br>
<button class="btn" type="submit">Register</button>

</form>
</div>
<script>

let nameInput = document.querySelector("#name")
let emailInput = document.querySelector("#email")
let phoneInput = document.querySelector("#phone")
let passInput = document.querySelector("#password")

let nameMsg = document.querySelector("#nameMsg")
let emailMsg = document.querySelector("#emailMsg")
let phoneMsg = document.querySelector("#phoneMsg")
let strength = document.querySelector("#strength")

nameInput.addEventListener("input",function(){

if(nameInput.value.length < 3){
nameMsg.textContent="Name must be 3 characters"
}else{
nameMsg.textContent="Valid name"
}

})

emailInput.addEventListener("input",function(){

if(emailInput.value.includes("@") && emailInput.value.includes(".")){
emailMsg.textContent="Valid email"
}else{
emailMsg.textContent="Invalid email"
}

})

phoneInput.addEventListener("input",function(){

if(phoneInput.value.length==10){
phoneMsg.textContent="Valid phone"
}else{
phoneMsg.textContent="Enter 10 digit phone"
}

})

passInput.addEventListener("input",function(){

let p = passInput.value

if(p.length<6){
strength.textContent="Weak password"
}
else if(p.match(/[0-9]/) && p.match(/[A-Z]/)){
strength.textContent="Strong password"
}
else{
strength.textContent="Medium password"
}

})

document.querySelector("#toggle").addEventListener("click",function(){

if(passInput.type=="password"){
passInput.type="text"
this.textContent="Hide"
}else{
passInput.type="password"
this.textContent="Show"
}

})

document.querySelector("#form").addEventListener("submit",function(e){

e.preventDefault()

let data = nameInput.value + "," + emailInput.value + "," + phoneInput.value

let submissions = localStorage.getItem("submissions") || ""

submissions = submissions + "|" + data

localStorage.setItem("submissions", submissions)

alert("Saved")

})

</script>

</body>
</html>
